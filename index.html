<script>
const categories = [

      'Loan Interest Calculator','Loan Eligibility Calculator','Inflation Calculator',
      'Compound Interest Calculator','Salary / HRA Calculator','Tip Calculator',
      'Discount Calculator','Percentage Calculator',
      'Mortgage Calculator','Paycheck Calculator','Credit Card Payoff Calculator',
      'Home Affordability Calculator','Rent vs Buy Calculator','Debt Payoff Calculator',
      'Salary to Hourly Calculator','401(k) Calculator','Roth IRA Calculator'
    ]
  },
  {
    id: 'health', name: 'Health', icon: '🏥', color: '#00E5A0',
    calcs: ['BMI Calculator','Age Calculator','Calorie Calculator','Water Intake Calculator','Ideal Body Weight Calculator','Sleep Calculator']

    id: 'education', name: 'Education', icon: '🎓', color: '#FFD700',

    id: 'creator', name: 'Creator Tools', icon: '📱', color: '#7B61FF',
    calcs: ['YouTube Money Calculator','Instagram Earnings Calculator','TikTok Earnings Calculator','AdSense Revenue Calculator']
  },
  {
    id: 'fun', name: 'Fun Tools', icon: '❤️', color: '#FF6B6B',
    calcs: ['Love Calculator','Name Compatibility','Lucky Number Calculator','Zodiac Compatibility']
  }
];

// Build sidebar
const nav = document.getElementById('sidebarNav');
const pagesDiv = document.getElementById('calc-pages');

categories.forEach(cat => {
  const sec = document.createElement('div');
  sec.className = 'cat-section';
  sec.innerHTML = `
    <div class="cat-header" onclick="toggleCat(this)">
      <span class="cat-icon">${cat.icon}</span>
      ${cat.name}
      <span class="cat-arrow">▶</span>
    </div>
    <div class="cat-items">
      ${cat.calcs.map(c => `<div class="calc-item" onclick="openCalc('${slug(c)}', '${c}', '${cat.name}', '${cat.icon}')">${c}</div>`).join('')}
    </div>
  `;
  nav.appendChild(sec);
});

// Category grid on home
const grid = document.getElementById('categoryGrid');
categories.forEach(cat => {
  const card = document.createElement('div');
  card.className = 'cat-card';
  card.style.setProperty('--accent-color', cat.color);
  card.innerHTML = `<div class="cat-card-icon">${cat.icon}</div><div class="cat-card-name">${cat.name}</div><div class="cat-card-count">${cat.calcs.length} calculators</div>`;
  card.onclick = () => {
    const sec = [...document.querySelectorAll('.cat-section')].find(s => s.querySelector('.cat-icon').textContent === cat.icon);
    if(sec && !sec.classList.contains('open')) sec.querySelector('.cat-header').click();
    openCalc(slug(cat.calcs[0]), cat.calcs[0], cat.name, cat.icon);
  };
  grid.appendChild(card);
});

function slug(name) { return name.toLowerCase().replace(/[^a-z0-9]+/g,'-'); }

function toggleCat(el) {
  el.parentElement.classList.toggle('open');
  el.classList.toggle('active');
}

function openCalc(id, name, cat, icon) {
  document.getElementById('home-page').style.display = 'none';
  document.querySelectorAll('.calc-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.calc-item').forEach(i => i.classList.remove('active'));

  let page = document.getElementById('page-'+id);
  if(!page) {
    page = buildCalcPage(id, name, cat, icon);
    pagesDiv.appendChild(page);
  }
  page.classList.add('active');

  const items = document.querySelectorAll('.calc-item');
  items.forEach(i => { if(i.textContent.trim() === name) i.classList.add('active'); });

  document.getElementById('topbarTitle').textContent = name;
  document.title = name + ' | SmartCalc';

let metaDesc = document.querySelector('meta[name="description"]');

if(metaDesc){
  metaDesc.setAttribute(
    'content',
    'Use our free ' + name + ' calculator online. Fast, accurate and easy calculations with SmartCalc.'
  );
}

history.pushState(
  { calc: id },
  '',
  '#' + id
);
  
  if(window.innerWidth <= 768) closeMobile();
}

function goHome() {
    document.getElementById('home-page').style.display = 'block';
    document.querySelectorAll('.calc-page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.calc-item').forEach(i => i.classList.remove('active'));
    document.getElementById('topbarTitle').textContent = 'SmartCalc';
    document.getElementById('topbarTitle').textContent = 'SmartCalc';
document.title = 'SmartCalc | Free Online Calculator Suite';

document.querySelector('meta[name="description"]')
?.setAttribute(
  'content',
  'SmartCalc offers free online calculators including EMI, SIP, GST, Tax, BMI, Age and more.'
);
}

window.addEventListener('popstate', function() {
    goHome();
});

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const tb = document.getElementById('topbar');
  const mn = document.getElementById('main');
  if(window.innerWidth <= 768) {
    sb.classList.toggle('mobile-open');
    document.getElementById('overlay').classList.toggle('show');
  } else {
    sb.classList.toggle('hidden');
    tb.classList.toggle('full');
    mn.classList.toggle('full');
  }
}

function closeMobile() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('overlay').classList.remove('show');
}

function fmt(n) {
  if(isNaN(n)) return '—';
  if(n >= 1e7) return '₹' + (n/1e7).toFixed(2) + ' Cr';
  if(n >= 1e5) return '₹' + (n/1e5).toFixed(2) + ' L';
  return '₹' + n.toLocaleString('en-IN', {maximumFractionDigits:2});
}

function num(id) { return parseFloat(document.getElementById(id).value) || 0; }
function val(id) { return document.getElementById(id).value; }
function set(id, v) { const el = document.getElementById(id); if(el) el.textContent = v; }

function showResult(id) { document.getElementById(id).classList.add('show'); }

// ============ CALC PAGE BUILDER ============
function buildCalcPage(id, name, cat, icon) {
  const div = document.createElement('div');

  const infoSection = buildInfoSection(id, name);
  div.innerHTML = `
    <div class="calc-header">
      <div class="calc-breadcrumb">
        <span onclick="goHome()">Home</span> › <span>${cat}</span> › <span>${name}</span>
      </div>
      <div class="calc-title">${icon} ${name}</div>

// ============ CALC LOGIC ============
let gstMode = 'exc', liMode = 'si', pctMode = 0;

function setGSTTab(m) {
  gstMode = m;
  document.getElementById('gst_exc').classList.toggle('active', m==='exc');
  document.getElementById('gst_inc').classList.toggle('active', m==='inc');
}

function setLITab(m) {
  liMode = m;
  document.getElementById('li_si').classList.toggle('active', m==='si');
  document.getElementById('li_ci').classList.toggle('active', m==='ci');
}

function setPctTab(n, el) {
  pctMode = n;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  [0,1,2].forEach(i => document.getElementById('pct'+i).style.display = i===n?'block':'none');
}

function calcEMI() {
  const P=num('emi_p'), r=num('emi_r')/12/100, n=num('emi_t');
  const emi = P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
  const tot = emi*n, int = tot-P;
  set('emi_val', '₹'+emi.toFixed(2));
  set('emi_p2', fmt(P));
  set('emi_int', fmt(int));
  set('emi_tot', fmt(tot));
  set('emi_pct', ((int/P)*100).toFixed(1)+'%');
  showResult('emi_res');
}

function calcSIP() {
  const m=num('sip_m'), r=num('sip_r')/12/100, n=num('sip_t')*12;
  const fv = m*((Math.pow(1+r,n)-1)/r)*(1+r);
  const inv = m*n;
  set('sip_fv', fmt(fv));
  set('sip_inv', fmt(inv));
  set('sip_gain', fmt(fv-inv));
  set('sip_ret', (((fv-inv)/inv)*100).toFixed(1)+'%');
  set('sip_mo', n+' months');
  showResult('sip_res');
}

function calcFD() {
  const P=num('fd_p'), r=num('fd_r')/100, t=num('fd_t'), n=parseInt(val('fd_freq'));
  const mat = P*Math.pow(1+r/n, n*t);
  set('fd_mat', fmt(mat));
  set('fd_p2', fmt(P));
  set('fd_int', fmt(mat-P));
  showResult('fd_res');
}

function calcRD() {
  const m=num('rd_m'), r=num('rd_r')/400, n=num('rd_t');
  const mat = m*(Math.pow(1+r,n)-1)/(1-(Math.pow(1+r,-1/3)));
  const dep = m*n;
  set('rd_mat', fmt(mat));
  set('rd_dep', fmt(dep));
  set('rd_int', fmt(mat-dep));
  showResult('rd_res');
}

function calcGST() {
  const a=num('gst_a'), r=num('gst_r')/100;
  let base, gstAmt;
  if(gstMode==='exc') { base=a; gstAmt=a*r; }
  else { base=a/(1+r); gstAmt=a-base; }
  const tot = base+gstAmt;
  set('gst_tot', fmt(tot));
  set('gst_base', fmt(base));
  set('gst_cgst', fmt(gstAmt/2));
  set('gst_sgst', fmt(gstAmt/2));

}

function calcTax() {
  const inc=num('tax_inc'), reg=val('tax_reg'), ded=num('tax_ded');
  let taxable = inc;
  let tax = 0;
  if(reg==='old') {
    taxable = Math.max(0, inc - ded - 50000); // std deduction
    const slabs = [[250000,0],[250000,0.05],[500000,0.2],[Infinity,0.3]];
    let rem = Math.max(0, taxable-250000);
    if(taxable>250000) { let t=Math.min(rem,250000)*0.05; tax+=t; rem-=250000; }
    if(rem>0) { let t=Math.min(rem,500000)*0.2; tax+=t; rem-=500000; }
    if(rem>0) tax+=rem*0.3;
  } else {
    taxable = Math.max(0, inc - 75000); // std deduction new
    const slabs = [[300000,0],[400000,0.05],[300000,0.1],[300000,0.15],[300000,0.2],[Infinity,0.3]];
    let rem = taxable;
    for(const [limit, rate] of slabs) {
      if(rem<=0) break;
      const chunk = Math.min(rem, limit);
      tax += chunk * rate;
      rem -= chunk;
    }
  }
  const cess = tax*0.04;
  const total = tax+cess;
  set('tax_txb', fmt(taxable));
  set('tax_base', fmt(tax));
  set('tax_cess', fmt(cess));
  set('tax_val', fmt(total));
  set('tax_mo', fmt(total/12));
  showResult('tax_res');
}

function calcAge() {
  const parts = val('age_dob').split('/');
  const dob = new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
  const now = new Date();
  let y=now.getFullYear()-dob.getFullYear(), m=now.getMonth()-dob.getMonth(), d=now.getDate()-dob.getDate();
  if(d<0){m--;d+=30;}if(m<0){y--;m+=12;}
  const days=Math.floor((now-dob)/86400000);
  const days_=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const next = new Date(now.getFullYear(), dob.getMonth(), dob.getDate());
  if(next<now) next.setFullYear(now.getFullYear()+1);
  const daysLeft=Math.ceil((next-now)/86400000);
  set('age_val', y+' yrs '+m+' mo '+d+' d');
  set('age_mo', (y*12+m)+' months');
  set('age_dy', days.toLocaleString()+' days');
  set('age_nb', daysLeft+' days away');
  set('age_day', days_[dob.getDay()]);
  showResult('age_res');
}

function calcCal() {

}

function calcSlp() {
  const t=val('slp_wake').split(':');
  const wakeMin=parseInt(t[0])*60+parseInt(t[1]);
  const fallAsleep=14;
  const cycles=[6,5,4,3];
  const times=cycles.map(c=>{
    let mins=wakeMin-(c*90+fallAsleep);
    if(mins<0) mins+=1440;
    const h=Math.floor(mins/60)%24, m=mins%60;
    return (h<10?'0':'')+h+':'+(m<10?'0':'')+m+' ('+c+' cycles)';
  });
  set('slp_val', times.join(' | '));
  showResult('slp_res');
}

    benefits: ['Know your tax liability in advance','Plan investments and savings better','Understand effective tax rate vs marginal rate','Compare old vs new regime','Avoid last-minute tax payment surprises'],
    faqs: [
      { q: 'Which tax regime should I choose?', a: 'New regime is better if you have fewer deductions. Old regime is better if you have large HRA, 80C, home loan deductions. Calculate both and compare.' },
      { q: 'What is the basic exemption limit?', a: 'Under New Regime (FY 2024-25), income up to ₹3 lakh is exempt. Plus, a rebate under Section 87A makes income up to ₹7 lakh effectively tax-free.' },
      { q: 'What is Health & Education Cess?', a: '4% cess is added on the total income tax payable. This goes toward education and health initiatives.' },
      { q: 'When is the ITR filing deadline?', a: 'For salaried individuals, the ITR deadline is usually July 31st of the assessment year. Filing late attracts a fee up to ₹5,000.' }
    ]
  },
  'cagr-calculator': {
    what: `CAGR (Compound Annual Growth Rate) measures the mean annual growth rate of an investment over a specified time period longer than one year. It represents one of the most accurate ways to calculate and determine returns for anything that can rise or fall in value over time.`,
    formula: `CAGR = (Final Value / Initial Value)^(1/n) − 1\n\nWhere:\nFinal Value = End value of investment\nInitial Value = Starting value\nn = Number of years`,
    benefits: ['Compare investments with different time periods','Smooths out volatility for clear picture','Widely used in mutual fund performance reporting','Helps set realistic return expectations','Better than simple average return'],
    faqs: [
      { q: 'What is a good CAGR for mutual funds?', a: 'A CAGR of 12–15% is considered good for equity mutual funds in India over the long term. Debt funds typically offer 6–8% CAGR.' },
      { q: 'What is the difference between CAGR and absolute return?', a: 'Absolute return shows total growth without considering time. CAGR annualizes that growth, making comparison across time periods fair.' },
      { q: 'Can CAGR be negative?', a: 'Yes, if the final value is less than the initial value, CAGR will be negative, indicating an average annual loss.' },
      { q: 'Does CAGR account for dividends?', a: 'Standard CAGR does not include dividends. Total Return CAGR includes reinvested dividends for a complete picture.' }
    ]
  },
  'currency-converter': {
    what: `A Currency Converter helps you find the equivalent value of one currency in another based on the current exchange rate. Exchange rates fluctuate constantly based on market conditions, geopolitical events, and economic factors.`,
    formula: `Converted Amount = Amount × Exchange Rate\n\nExchange rates shown are approximate reference rates.\nActual rates from banks/forex may differ slightly.`,
    benefits: ['Quick reference for international transactions','Useful for travel budget planning','Compare costs across countries','Helpful for freelancers receiving foreign payments','Track currency trends over time'],
    faqs: [
      { q: 'Why does the bank rate differ from the calculator?', a: 'Banks add a spread (margin) over the inter-bank rate. The rate shown here is an approximate mid-market rate.' },
      { q: 'How often do exchange rates change?', a: 'Forex markets are open 24×5 and rates change every second during trading hours based on global supply and demand.' },
      { q: 'What is a good USD to INR rate?', a: 'This depends on the current market. The rate has historically ranged from ₹65 to ₹87 per USD in recent years.' },
      { q: 'What is TT rate?', a: 'TT (Telegraphic Transfer) rate is the exchange rate used by banks for wire transfers. It includes the bank\'s margin over the base rate.' }
    ]
  },
  'loan-interest-calculator': {
    what: `A Loan Interest Calculator helps you determine the total interest payable on a loan. It supports both Simple Interest (SI) and Compound Interest (CI) methods, so you can understand exactly how much extra you pay over the principal amount.`,
    formula: `Simple Interest:\nSI = P × R × T / 100\n\nCompound Interest:\nCI = P × (1 + R/100)^T − P\n\nWhere P = Principal, R = Rate (%), T = Time (years)`,
    benefits: ['Know total interest cost before taking a loan','Compare SI vs CI loans','Helps negotiate better loan terms','Plan repayment strategy effectively','Understand true cost of borrowing'],
    faqs: [
      { q: 'Which is better — SI or CI loan?', a: 'As a borrower, Simple Interest loans are better since you pay less interest. Compound interest loans cost more as interest is calculated on accumulated interest too.' },
      { q: 'Do home loans use SI or CI?', a: 'Most home loans in India use monthly reducing balance method (a form of compound interest), where interest is recalculated on the outstanding principal each month.' },
      { q: 'What is a reducing balance loan?', a: 'In a reducing balance loan, interest is calculated on the outstanding principal after each EMI payment, so interest reduces over time as the principal decreases.' },
      { q: 'How can I reduce my loan interest?', a: 'Make part prepayments, choose a shorter tenure, maintain a good credit score for lower rates, and compare offers across lenders.' }
    ]
  },
  'loan-eligibility-calculator': {
    what: `A Loan Eligibility Calculator estimates the maximum loan amount a bank may approve based on your monthly income, existing obligations, interest rate, and tenure. Lenders use FOIR (Fixed Obligation to Income Ratio) to determine eligibility.`,
    formula: `Max EMI = Monthly Income × FOIR − Existing EMIs\n(Banks typically allow FOIR of 40–60%)\n\nMax Loan = Max EMI × [(1+r)ⁿ − 1] / [r × (1+r)ⁿ]\n\nWhere r = monthly rate, n = tenure in months`,
    benefits: ['Know your borrowing power before applying','Avoid loan rejection due to over-application','Plan home purchase or investment accordingly','Optimize tenure for maximum loan amount','Understand how existing EMIs affect eligibility'],
    faqs: [
      { q: 'What is FOIR?', a: 'FOIR (Fixed Obligation to Income Ratio) is the percentage of income going toward all fixed monthly obligations including EMIs. Most banks cap this at 40–60%.' },
      { q: 'How can I increase my loan eligibility?', a: 'Clear existing loans, add a co-applicant, increase income, opt for longer tenure, or improve your CIBIL score above 750.' },
      { q: 'Does credit score affect eligibility?', a: 'Yes. A CIBIL score above 750 not only increases eligibility but also helps you get lower interest rates.' },
      { q: 'Is the calculator result guaranteed?', a: 'No. This is an estimate. Actual eligibility depends on the lender\'s policy, credit score, employment type, and other factors.' }
    ]
  },
  'inflation-calculator': {
    what: `An Inflation Calculator shows how the purchasing power of money changes over time. Inflation erodes the real value of money — ₹1 lakh today won't have the same buying power 10 years later. This tool helps you plan savings to beat inflation.`,
    formula: `Future Value = Present Value × (1 + Inflation Rate)^Years\n\nPurchasing Power = Present Value / (1 + Inflation Rate)^Years\n\nValue Lost = Future Value − Present Value`,
    benefits: ['Understand real value of your savings','Plan retirement corpus accounting for inflation','Set realistic financial goals','Understand why cost of living keeps rising','Motivates investing instead of just saving'],
    faqs: [
      { q: 'What is the average inflation rate in India?', a: 'India\'s average CPI inflation has been around 5–7% per year over the last decade. Food inflation can be higher at 8–10%.' },
      { q: 'How does inflation affect fixed deposits?', a: 'If FD returns 7% and inflation is 6%, your real return is only 1%. Investments that beat inflation (like equity) are crucial for long-term wealth.' },
      { q: 'What is core inflation?', a: 'Core inflation excludes volatile food and fuel prices to show the underlying inflation trend. It is a key indicator used by RBI for policy decisions.' },
      { q: 'How can I hedge against inflation?', a: 'Invest in equity mutual funds, real estate, gold, or inflation-indexed bonds (IIBs) which tend to provide returns above inflation over the long term.' }
    ]
  },
  'compound-interest-calculator': {
    what: `Compound Interest is interest calculated on both the initial principal and the accumulated interest from previous periods. Often called the "8th wonder of the world," compounding is the engine behind long-term wealth creation.`,
    formula: `A = P × (1 + r/n)^(n×t)\n\nWhere:\nA = Final amount\nP = Principal\nr = Annual interest rate\nn = Compounding frequency per year\nt = Time in years`,
    benefits: ['Understand how money grows exponentially','Compare different compounding frequencies','Motivates early investing — time is the biggest factor','Used in FD, RD, mutual fund, and loan calculations','Demonstrates why starting early matters enormously'],
    faqs: [
      { q: 'What is the difference between simple and compound interest?', a: 'Simple interest is calculated only on the principal. Compound interest is calculated on principal plus previously earned interest, leading to exponential growth.' },
      { q: 'How often should interest compound for maximum growth?', a: 'The more frequently interest compounds, the more you earn. Monthly compounding gives slightly more than quarterly, which is more than yearly.' },
      { q: 'What is the Rule of 72?', a: 'Divide 72 by the annual interest rate to find the approximate number of years to double your money. E.g., at 9%, money doubles in ~8 years.' },
      { q: 'Does compounding work against you too?', a: 'Yes! On credit card debt, compound interest works against you. Unpaid balances grow rapidly, which is why clearing credit card dues quickly is crucial.' }
    ]
  },
  'salary-/-hra-calculator': {
    what: `HRA (House Rent Allowance) is a component of salary provided by employers for accommodation expenses. The HRA exemption under Section 10(13A) allows salaried employees living in rented accommodation to reduce their taxable income.`,
    formula: `HRA Exemption = Minimum of:\n1. Actual HRA received\n2. 50% of Basic Salary (Metro) or 40% (Non-Metro)\n3. Actual Rent Paid − 10% of Basic Salary\n\nTaxable HRA = HRA Received − Exemption`,
    benefits: ['Reduce your taxable income legally','Maximize HRA exemption claim','Understand metro vs non-metro differences','Plan salary structure for tax efficiency','Avoid errors in Form 16 and ITR filing'],
    faqs: [
      { q: 'Which cities are considered Metro for HRA?', a: 'Delhi, Mumbai, Kolkata, and Chennai are considered metro cities where 50% of basic salary is considered for HRA exemption. All other cities get 40%.' },
      { q: 'Can I claim HRA if I live with parents?', a: 'Yes! You can pay rent to your parents and claim HRA, provided the rent is genuine, you have a rental agreement, and your parents show it as rental income.' },
      { q: 'Is rent receipt mandatory for HRA?', a: 'Rent receipts are required if annual HRA exemption exceeds ₹1 lakh. The landlord\'s PAN is needed if rent exceeds ₹1 lakh/year.' },
      { q: 'Can I claim both HRA and home loan benefit?', a: 'Yes, if your rented residence is in a different city from your owned property, you can claim both HRA and home loan interest deduction simultaneously.' }
    ]
  },
  'tip-calculator': {
    what: `A Tip Calculator helps you quickly determine how much tip to leave at a restaurant, salon, or service provider, and how to split the bill fairly among a group. It takes the guesswork out of tipping and ensures everyone pays their fair share.`,
    formula: `Tip Amount = Bill × Tip Percentage / 100\nTotal Bill = Bill + Tip Amount\nPer Person = Total Bill / Number of People`,
    benefits: ['No awkward mental math at the table','Split bills fairly in a group','Choose appropriate tip percentage for service quality','Helps budget dining expenses','Works for any service — restaurants, cabs, salons'],
    faqs: [
      { q: 'How much should I tip at a restaurant in India?', a: 'Tipping culture in India is growing. A 10% tip for good service at a restaurant is appreciated. Fine dining may warrant 15–20%.' },
      { q: 'Should I tip on the pre-tax or post-tax amount?', a: 'Traditionally, tip is calculated on the pre-tax subtotal. However, tipping on the total is also acceptable and simpler.' },
      { q: 'Is tipping mandatory?', a: 'No, tipping is voluntary. However, many service workers rely on tips as a significant part of their income.' },
      { q: 'What if service was poor?', a: 'You can reduce the tip percentage or skip it for genuinely poor service. However, consider whether the issue was with the server or kitchen.' }
    ]
  },
  'discount-calculator': {
    what: `A Discount Calculator helps you instantly find out how much you save on a product and what the final price is after applying a discount percentage. Useful during sales, coupon applications, or negotiating prices.`,
    formula: `Discount Amount = Original Price × Discount% / 100\nFinal Price = Original Price − Discount Amount\nSavings% = Discount%`,
    benefits: ['Instantly know the deal value','Compare discounts across products','Avoid being misled by fake "original prices"','Useful for business pricing decisions','Quick check during online/offline shopping'],
    faqs: [
      { q: 'How do I calculate discount percentage from two prices?', a: 'Discount% = (Original Price − Sale Price) / Original Price × 100. Our Percentage Calculator can do this too.' },
      { q: 'What is a double discount?', a: 'A double discount applies two discounts sequentially. E.g., 20% then 10% off gives 28% off (not 30%). Always calculate step by step.' },
      { q: 'What is MRP?', a: 'MRP (Maximum Retail Price) is the maximum price a retailer can charge in India. Discounts are usually shown as a percentage off MRP.' },
      { q: 'How do cashback offers differ from discounts?', a: 'Discounts reduce the price upfront. Cashback is returned after purchase, usually through a wallet or bank account, so you pay full and get money back.' }
    ]
  },
  'percentage-calculator': {
    what: `A Percentage Calculator solves the three most common percentage problems: finding what percent of a number is, calculating percentage change between two values, and determining what percentage one number is of another.`,
    formula: `% of Number: Result = (Percent / 100) × Number\n\n% Change: Change% = (New − Old) / Old × 100\n\nX is ?% of Y: Result = (X / Y) × 100`,
    benefits: ['Solve all types of percentage problems','Quick calculations for exams and daily use','Useful in finance, shopping, and data analysis','No formula memorization needed','Handles increase, decrease, and comparison'],
    faqs: [
      { q: 'What is percentage increase?', a: 'Percentage increase = (New Value − Old Value) / Old Value × 100. A positive result is an increase; negative is a decrease.' },
      { q: 'How to find the original price before discount?', a: 'If ₹80 is after 20% off, original = 80 / (1 − 20/100) = 80 / 0.8 = ₹100.' },
      { q: 'What does percentage point mean?', a: 'Percentage point is the arithmetic difference between two percentages. E.g., interest rising from 8% to 10% is a 2 percentage point rise (not 25% rise).' },
      { q: 'How is percentage used in CIBIL scores?', a: 'CIBIL score isn\'t a percentage but a number from 300–900. However, credit utilization (credit used ÷ total limit × 100) is a percentage that impacts your score.' }
    ]
  },
  'bmi-calculator': {
    what: `BMI (Body Mass Index) is a simple calculation using height and weight that gives a reasonable indicator of body fatness for most adults. It is widely used by healthcare professionals for initial health screening. BMI does not measure body fat directly but correlates with more direct measures.`,
    formula: `BMI = Weight (kg) / Height (m)²\n\nCategories:\n< 18.5: Underweight\n18.5 – 24.9: Normal weight\n25 – 29.9: Overweight\n≥ 30: Obese`,
    benefits: ['Quick health screening tool','No special equipment needed','Identifies risk for weight-related diseases','Tracks weight loss/gain progress','Used by doctors, gyms, and insurance companies'],
    faqs: [
      { q: 'Is BMI accurate for everyone?', a: 'BMI is a general screening tool and may not be accurate for athletes (high muscle mass), elderly (muscle loss), pregnant women, or children.' },
      { q: 'What BMI range is healthy?', a: 'A BMI between 18.5 and 24.9 is considered normal/healthy for most adults. For Asians, some guidelines suggest a lower threshold of 23 for overweight.' },
      { q: 'What health risks are linked to high BMI?', a: 'High BMI is associated with type 2 diabetes, heart disease, high blood pressure, sleep apnea, and certain cancers.' },
      { q: 'Can BMI be too low?', a: 'Yes. BMI under 18.5 (underweight) is linked to malnutrition, weakened immunity, osteoporosis, and anemia.' }
    ]
  },
  'age-calculator': {
    what: `An Age Calculator precisely determines your current age in years, months, and days from your date of birth. It also tells you the total days you've lived, which day of the week you were born on, and how many days until your next birthday.`,
    formula: `Age = Current Date − Date of Birth\n\nBreakdown:\nYears = full calendar years completed\nMonths = remaining full months\nDays = remaining days after months\nTotal Days = (Today − DOB) in days`,
    benefits: ['Exact age for official forms and documents','Know your birth day of the week','Track days to your next birthday','Useful for insurance, legal, and medical purposes','Satisfies curiosity about total days lived'],
    faqs: [
      { q: 'Why does my age differ slightly in different calculators?', a: 'Different calculators handle month-end dates differently. Some count 30 days as a month; others use actual calendar months.' },
      { q: 'How to calculate age for official purposes?', a: 'Official age is typically the number of completed years as on the reference date, ignoring months and days beyond the last birthday.' },
      { q: 'What day of the week was I born?', a: 'This calculator shows you exactly which day of the week your date of birth falls on — a fun fact many people don\'t know!' },
      { q: 'How many days have I lived?', a: 'The calculator shows total days elapsed since your birth date, which is a fascinating perspective on the time you\'ve experienced.' }
    ]
  },
  'calorie-calculator': {
    what: `A Calorie Calculator estimates your BMR (Basal Metabolic Rate) — calories your body burns at rest — and your TDEE (Total Daily Energy Expenditure) based on your activity level. Use this to set calorie goals for weight loss, maintenance, or gain.`,
    formula: `BMR (Mifflin-St Jeor):\nMen: 10×W + 6.25×H − 5×A + 5\nWomen: 10×W + 6.25×H − 5×A − 161\n\nTDEE = BMR × Activity Multiplier\nWeight Loss = TDEE − 500 kcal/day`,
    benefits: ['Set evidence-based calorie targets','Understand your body\'s energy needs','Plan diet for weight loss or muscle gain','No guesswork — science-backed formula','Adjusts for different activity levels'],
    faqs: [
      { q: 'How accurate is this calorie calculator?', a: 'The Mifflin-St Jeor equation is considered the most accurate for most people, with ±10% variance. Individual metabolism can vary.' },
      { q: 'How many calories to lose 1 kg per week?', a: 'A deficit of ~7,700 kcal is needed to lose 1 kg. That\'s roughly 1,100 kcal/day deficit. A safe and sustainable rate is 0.5 kg/week (500 kcal deficit/day).' },
      { q: 'Should I eat below BMR?', a: 'No. Eating below BMR can slow metabolism, cause muscle loss, nutrient deficiencies, and is generally unsafe without medical supervision.' },
      { q: 'What activity multiplier should I choose?', a: 'Be honest — most people overestimate their activity. "Lightly active" (1–3 days exercise) is accurate for most office workers who exercise a few days a week.' }
    ]
  },
  'water-intake-calculator': {
    what: `A Water Intake Calculator estimates the daily water intake your body needs based on your weight and activity level. Proper hydration is essential for metabolism, temperature regulation, joint lubrication, and overall health.`,
    formula: `Daily Water (L) = Body Weight (kg) × 0.033 × Activity Multiplier\n\nActivity Multipliers:\nSedentary: 1.0 | Light: 1.2\nModerate: 1.4 | Active: 1.6`,
    benefits: ['Personalized hydration target','Understand how exercise increases water needs','Prevent dehydration and its effects','Track intake in liters, glasses, or bottles','Simple formula based on body weight'],
    faqs: [
      { q: 'Is the 8 glasses a day rule accurate?', a: 'The "8 glasses" rule is a general guideline, not scientifically precise. Individual needs vary based on weight, climate, and activity level.' },
      { q: 'Does tea/coffee count toward water intake?', a: 'Yes, beverages including tea and coffee contribute to hydration. However, caffeinated drinks have mild diuretic effects, so plain water is still best.' },
      { q: 'Signs of dehydration to watch for?', a: 'Dark yellow urine, dry mouth, fatigue, dizziness, and headaches are common signs. Urine should ideally be pale yellow for adequate hydration.' },
      { q: 'Can you drink too much water?', a: 'Yes. Overhydration (hyponatremia) is rare but possible, usually in endurance athletes who drink excessive water without electrolytes.' }
    ]
  },
  'ideal-body-weight-calculator': {
    what: `Ideal Body Weight (IBW) is an estimated weight considered optimal for your height and gender. Based on the Devine formula used in clinical settings, IBW helps set realistic weight goals and is used in medicine for drug dosing and health assessments.`,
    formula: `Men: IBW = 50 + 2.3 × (Height in inches − 60)\nWomen: IBW = 45.5 + 2.3 × (Height in inches − 60)\n\nHealthy Range = IBW ± 10%\n(Valid for heights above 5 feet / 152 cm)`,
    benefits: ['Set a realistic, healthy weight target','Used in clinical drug dosing','Helps assess cardiovascular and metabolic risk','Better goal-setting than arbitrary numbers','Accounts for both height and gender'],
    faqs: [
      { q: 'Is IBW the same as target body weight?', a: 'IBW is a clinical estimate. Target body weight is personal and may differ based on muscle mass, bone density, and body composition goals.' },
      { q: 'What if I\'m below 5 feet tall?', a: 'The Devine formula is designed for heights above 5 feet. For shorter individuals, adjusted or alternative formulas may be more appropriate.' },
      { q: 'Should I aim exactly for IBW?', a: 'The healthy range (IBW ±10%) is more realistic. Being within this range is considered healthy; exact IBW isn\'t a strict requirement.' },
      { q: 'How does IBW differ from BMI?', a: 'BMI uses both weight and height for a ratio. IBW provides a single target weight for a given height and gender, used more in clinical settings.' }
    ]
  },
  'sleep-calculator': {
    what: `A Sleep Calculator helps you find the optimal time to go to sleep based on when you need to wake up. It works by aligning your sleep schedule with your natural sleep cycles, each lasting approximately 90 minutes, so you wake up at the end of a cycle feeling refreshed.`,
    formula: `Bedtime = Wake Time − (Sleep Cycles × 90 min) − 14 min\n\n14 minutes = average time to fall asleep\nOptimal cycles: 5–6 cycles (7.5–9 hours)\nMinimum: 4 cycles (6 hours)`,
    benefits: ['Wake up refreshed by timing sleep cycles','Reduce groggy morning feeling','Optimize sleep for productivity','Understand your natural sleep rhythm','Works backward from your wake-up time'],
    faqs: [
      { q: 'How long is one sleep cycle?', a: 'One sleep cycle lasts approximately 90 minutes and includes light sleep, deep sleep (slow-wave), and REM sleep stages.' },
      { q: 'How many sleep cycles do I need?', a: 'Adults need 5–6 complete cycles (7.5–9 hours). Waking mid-cycle causes sleep inertia — that groggy feeling in the morning.' },
      { q: 'What is REM sleep?', a: 'REM (Rapid Eye Movement) sleep is when most dreaming occurs. It is crucial for memory consolidation, learning, emotional processing, and creativity.' },
      { q: 'Can I catch up on sleep on weekends?', a: 'Partially. While some recovery sleep is possible, chronic sleep deprivation has cumulative effects that aren\'t fully reversed by weekend catch-up sleep.' }
    ]
  },
  'student-calculator': {
    what: `A Student Calculator computes your total marks, percentage, and letter grade across multiple subjects. It\'s useful for quickly understanding your academic performance and where you stand grade-wise at the end of a semester or exam.`,
    formula: `Total Marks = Sum of all subject scores\nPercentage = (Total Marks / Max Possible) × 100\n\nGrade:\n≥90%: A+ | ≥80%: A | ≥70%: B\n≥60%: C | ≥50%: D | <50%: F`,
    benefits: ['Instant grade and percentage calculation','Track academic performance across subjects','Identify weak subjects needing attention','Useful for scholarship and college applications','Quick result checking before official announcement'],
    faqs: [
      { q: 'How is percentage calculated from marks?', a: 'Percentage = (Marks Obtained / Total Maximum Marks) × 100. Our calculator does this automatically for all 5 subjects.' },
      { q: 'What percentage is required for distinction?', a: 'Typically, 75% and above is distinction, 60%–75% is first class. This varies by institution and university.' },
      { q: 'How do I convert percentage to CGPA?', a: 'CGPA = Percentage / 9.5 (for 10-point scale). Use our CGPA to Percentage calculator to convert both ways.' },
      { q: 'What is grade inflation?', a: 'Grade inflation is when grades rise over time without corresponding improvement in learning. It\'s a concern in many education systems globally.' }
    ]
  },
  'gpa-calculator': {
    what: `GPA (Grade Point Average) is a standardized measure of academic achievement used primarily in the US education system. It is calculated by averaging the grade points earned across all courses, weighted by the number of credits each course carries.`,
    formula: `GPA = Σ(Grade Points × Credits) / Σ(Credits)\n\nGrade Points:\nA = 4.0 | A- = 3.7 | B+ = 3.3\nB = 3.0 | B- = 2.7 | C+ = 2.3\nC = 2.0 | D = 1.0 | F = 0`,
    benefits: ['Calculate weighted GPA across multiple courses','Track academic standing each semester','Required for graduate school applications','Helps assess scholarship eligibility','Immediate feedback on academic performance'],
    faqs: [
      { q: 'What is a good GPA?', a: 'A GPA of 3.5+ is considered excellent. 3.0–3.5 is good, 2.5–3.0 is average. For competitive grad schools, 3.7+ is often expected.' },
      { q: 'What is the difference between GPA and CGPA?', a: 'GPA is for a single semester. CGPA (Cumulative GPA) is the average across all semesters of study — the overall academic performance indicator.' },
      { q: 'Can I raise my GPA in the final year?', a: 'Yes, but the impact diminishes over time. Later semesters have less weight on the cumulative GPA. Focus on courses with more credits.' },
      { q: 'Does GPA matter for jobs?', a: 'For entry-level jobs, GPA matters more. With experience, skills and portfolio take precedence. Some companies (especially consulting/finance) have GPA cutoffs.' }
    ]
  },
  'cgpa-to-percentage': {
    what: `CGPA to Percentage conversion helps students translate their Cumulative Grade Point Average into a percentage equivalent, which is often required for job applications, competitive exams, and further studies where percentage-based criteria apply.`,
    formula: `For 10-Point Scale (CBSE/Indian Universities):\nPercentage = CGPA × 9.5\n\nFor 4-Point Scale (US System):\nPercentage = (CGPA / 4) × 100\n\nNote: Different universities may use different conversion formulas.`,
    benefits: ['Required for government job applications','Needed for abroad university applications','Useful when employers ask for percentage','Standardizes different grading systems','Quick conversion without manual calculation'],
    faqs: [
      { q: 'Is 9.5 the correct multiplier for all universities?', a: 'The 9.5 multiplier is standard for CBSE. Some universities like VTU, Anna University use different formulas. Always check your university\'s official conversion formula.' },
      { q: 'Is 8 CGPA good?', a: 'On a 10-point scale, 8 CGPA = ~76%, which is First Class. On a 4-point scale, 8 is impossible — max is 4.0.' },
      { q: 'What CGPA is required for government jobs?', a: 'Most government jobs require 60% or equivalent (~6.3 CGPA on 10-point scale). Some positions require 65% or 55% depending on category.' },
      { q: 'Does this conversion work for IIT/NIT grading?', a: 'IITs and NITs use 10-point scales but may have different internal conversion formulas. The 9.5 multiplier is a general approximation.' }
    ]
  },
  'youtube-money-calculator': {
    what: `A YouTube Money Calculator estimates potential earnings from a YouTube channel based on daily views, RPM (Revenue Per Mille — per 1000 views), and content niche. Actual YouTube earnings depend on audience location, ad type, engagement rate, and seasonality.`,
    formula: `Daily Earnings = (Views / 1000) × RPM × Niche Multiplier\nMonthly = Daily × 30\nYearly = Monthly × 12\n\nNote: YouTube takes ~45% of ad revenue.\nRPM shown should be creator's take-home RPM.`,
    benefits: ['Estimate channel monetization potential','Compare earnings across niches','Plan content strategy based on RPM','Set realistic income goals','Understand how views convert to revenue'],
    faqs: [

function buildInfoSection(id, name) {
  const info = calcInfo[id];
  if (!info) return '';
  const pid = id.replace(/-/g,'_');
  const tabLabels = ['What is ' + name + '?', name + ' Formula', 'Benefits', 'FAQ'];
  const tabIds = ['what','formula','benefits','faq'];

  const tabBtns = tabLabels.map((label, i) =>
    `<button class="info-tab-btn${i===0?' active':''}" onclick="switchInfoTab('${pid}','${tabIds[i]}',this)">${label}</button>`
  ).join('');

  const benefitsHTML = info.benefits.map(b => `<li>${b}</li>`).join('');
  const faqsHTML = info.faqs.map((f,i) =>
    `<div class="faq-item" id="faq_${pid}_${i}">
      <div class="faq-q" onclick="toggleFaq('faq_${pid}_${i}')">${f.q}<span class="faq-arrow">+</span></div>
      <div class="faq-a">${f.a}</div>
    </div>`
  ).join('');

  return `
  <div class="info-section">
    <div class="info-tab-row">${tabBtns}</div>
    <div class="info-panel active" id="${pid}_what">
      <h3>What is ${name}?</h3>
      <p>${info.what}</p>
    </div>
    <div class="info-panel" id="${pid}_formula">
      <h3>${name} Formula</h3>
      <div class="formula-box">${info.formula.replace(/\n/g,'<br>')}</div>
    </div>
    <div class="info-panel" id="${pid}_benefits">
      <h3>Benefits of Using ${name}</h3>
      <ul class="benefits-list">${benefitsHTML}</ul>
    </div>
    <div class="info-panel" id="${pid}_faq">
      <h3>Frequently Asked Questions</h3>
      ${faqsHTML}
    </div>
  </div>`;
}

function switchInfoTab(pid, tab, btn) {
  const section = btn.closest('.info-section');
  section.querySelectorAll('.info-tab-btn').forEach(b => b.classList.remove('active'));
  section.querySelectorAll('.info-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const panel = document.getElementById(pid + '_' + tab);
  if (panel) panel.classList.add('active');
}

function toggleFaq(id) {
  const item = document.getElementById(id);
  item.classList.toggle('open');
}

// ============ NEW CALC LOGIC ============

function fmtUSD(n) {
  if(isNaN(n)) return '—';
  if(n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if(n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
  return '$' + n.toLocaleString('en-US', {maximumFractionDigits:2});
}

function calcMort() {
  const price = num('mort_price'), down = num('mort_down');
  const r = num('mort_r') / 100 / 12, t = num('mort_t') * 12;
  const tax = num('mort_tax');
  const loan = price - down;
  if(loan <= 0 || r <= 0) return;
  const pi = loan * r * Math.pow(1+r, t) / (Math.pow(1+r, t) - 1);
  const taxmo = tax / 12;
  const total = pi * t;
  const totalInterest = total - loan;
  set('mort_pi', fmtUSD(pi));
  set('mort_taxmo', fmtUSD(taxmo));
  set('mort_int', fmtUSD(totalInterest));
  set('mort_tot', fmtUSD(total + down));
  set('mort_mo', fmtUSD(pi + taxmo));
  showResult('mort_res');
}

function calcPaycheck() {
  const gross = num('pay_gross');
  const freq = parseInt(val('pay_freq'));
  const fedPct = num('pay_fed') / 100, statePct = num('pay_state') / 100;
  const other = num('pay_other');
  const fica = gross * 0.0765;
  const fedAmt = gross * fedPct;
  const stateAmt = gross * statePct;
  const net = gross - fedAmt - stateAmt - fica - other;
  set('pay_fedamt', fmtUSD(fedAmt));
  set('pay_stateamt', fmtUSD(stateAmt));
  set('pay_fica', fmtUSD(fica));
  set('pay_net', fmtUSD(net));
  set('pay_annual', fmtUSD(net * freq));
  showResult('pay_res');
}

function calcCC() {
  const bal = num('cc_bal'), apr = num('cc_apr') / 100 / 12, pay = num('cc_pay');
  if(pay <= bal * apr) { set('cc_months', 'Payment too low'); showResult('cc_res'); return; }
  const months = Math.ceil(-Math.log(1 - bal * apr / pay) / Math.log(1 + apr));
  const totalPaid = pay * months;
  const totalInt = totalPaid - bal;
  const date = new Date(); date.setMonth(date.getMonth() + months);
  set('cc_months', months + ' months');
  set('cc_int', fmtUSD(totalInt));
  set('cc_tot', fmtUSD(totalPaid));
  set('cc_date', date.toLocaleDateString('en-US', {month:'short', year:'numeric'}));
  set('cc_pct', ((totalInt / bal) * 100).toFixed(1) + '%');
  showResult('cc_res');
}

function calcHA() {
  const inc = num('ha_inc'), debt = num('ha_debt'), down = num('ha_down');
  const r = num('ha_r') / 100 / 12, t = num('ha_t') * 12;
  const maxMonthly = (inc / 12) * 0.28;
  const maxPayment = maxMonthly - debt;
  const maxLoan = maxPayment * (Math.pow(1+r, t) - 1) / (r * Math.pow(1+r, t));
  const maxPrice = maxLoan + down;
  const dti = ((debt + maxPayment) / (inc / 12) * 100).toFixed(1);
  const dpct = (down / maxPrice * 100).toFixed(1);
  set('ha_price', fmtUSD(maxPrice));
  set('ha_mo', fmtUSD(maxPayment));
  set('ha_loan', fmtUSD(maxLoan));
  set('ha_dti', dti + '%');
  set('ha_dpct', dpct + '%');
  showResult('ha_res');
}

function calcRVB() {
  const price = num('rvb_price'), down = num('rvb_down'), rent = num('rvb_rent');
  const r = num('rvb_r') / 100 / 12, yrs = num('rvb_yrs');
  const months = yrs * 12;
  const loan = price - down;
  const mortmo = loan * r * Math.pow(1+r, months*12/months) / (Math.pow(1+r, months*12/months) - 1);
  // Simplified: buy cost = down + (mortgage * months) + maint(1% home/yr)
  const maint = price * 0.01 * yrs;
  const buyCost = down + mortmo * months + maint;
  const rentCost = rent * months;
  const save = Math.abs(buyCost - rentCost);
  const winner = buyCost < rentCost ? '🏠 Buying' : '🏢 Renting';
  set('rvb_winner', winner);
  set('rvb_buycost', fmtUSD(buyCost));
  set('rvb_rentcost', fmtUSD(rentCost));
  set('rvb_mortmo', fmtUSD(mortmo));
  set('rvb_save', fmtUSD(save));
  showResult('rvb_res');
}

function calcDP() {
  const bal = num('dp_bal'), r = num('dp_r') / 100 / 12, pay = num('dp_pay');
  const minPay = bal * r;
  if(pay <= minPay) { set('dp_months', 'Increase payment'); showResult('dp_res'); return; }
  const months = Math.ceil(-Math.log(1 - bal * r / pay) / Math.log(1 + r));
  const totalPaid = pay * months;
  const totalInt = totalPaid - bal;
  const date = new Date(); date.setMonth(date.getMonth() + months);
  set('dp_months', months + ' months (' + Math.ceil(months/12) + ' yrs)');
  set('dp_int', fmtUSD(totalInt));
  set('dp_tot', fmtUSD(totalPaid));
  set('dp_date', date.toLocaleDateString('en-US', {month:'short', year:'numeric'}));
  set('dp_min', fmtUSD(minPay + 1));
  showResult('dp_res');
}

function calcSTH() {
  const sal = num('sth_sal'), hrs = num('sth_hrs'), wks = num('sth_wks');
  const totalHrs = hrs * wks;
  const hourly = sal / totalHrs;
  set('sth_hr', fmtUSD(hourly) + '/hr');
  set('sth_day', fmtUSD(hourly * 8));
  set('sth_wk', fmtUSD(hourly * hrs));
  set('sth_mo', fmtUSD(sal / 12));
  set('sth_yr', fmtUSD(sal));
  showResult('sth_res');
}

function calc401k() {
  const age = num('k401_age'), ret = num('k401_ret'), bal = num('k401_bal');
  const con = num('k401_con'), matchPct = num('k401_match') / 100;
  const r = num('k401_r') / 100 / 12;
  const yrs = ret - age;
  if(yrs <= 0) return;
  const months = yrs * 12;
  const empMatch = con * matchPct;
  const totalCon = con + empMatch;
  let balance = bal;
  let yourTotal = 0, empTotal = 0;
  for(let i = 0; i < months; i++) {
    balance = balance * (1 + r) + totalCon;
    yourTotal += con;
    empTotal += empMatch;
  }
  const growth = balance - bal - yourTotal - empTotal;
  set('k401_final', fmtUSD(balance));
  set('k401_yours', fmtUSD(yourTotal));
  set('k401_emp', fmtUSD(empTotal));
  set('k401_growth', fmtUSD(growth));
  set('k401_yrs', yrs + ' years');
  showResult('k401_res');
}

function calcRoth() {
  const age = num('roth_age'), ret = num('roth_ret'), con = num('roth_con');
  const bal = num('roth_bal'), r = num('roth_r') / 100;
  const yrs = ret - age;
  if(yrs <= 0) return;
  let balance = bal;
  for(let i = 0; i < yrs; i++) { balance = (balance + con) * (1 + r); }
  const totalCon = con * yrs + bal;
  const growth = balance - totalCon;
  const taxSave = growth * 0.22; // est 22% bracket
  set('roth_final', fmtUSD(balance));
  set('roth_totcon', fmtUSD(con * yrs));
  set('roth_growth', fmtUSD(growth));
  set('roth_tax', fmtUSD(taxSave));
  set('roth_yrs', yrs + ' years');
  showResult('roth_res');
}
